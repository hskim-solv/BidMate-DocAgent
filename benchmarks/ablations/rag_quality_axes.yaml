id: rag_quality_axes
name: RAG quality/cost ablation axes
description: Compare naive keyword, dense, metadata-first reranking, verifier retry, and hierarchical evidence assembly.
baseline_run: naive_keyword
primary_run: full
runs:
  - name: full
    retrieval_strategy: metadata_rerank
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: hierarchical
    retrieval_strategy: hierarchical
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: hierarchical
  - name: naive_keyword
    retrieval_strategy: naive
    metadata_first: false
    rerank: false
    verifier_retry: false
    retrieval_mode: flat
  - name: dense_only
    retrieval_strategy: dense
    metadata_first: false
    rerank: false
    verifier_retry: false
    retrieval_mode: flat
  - name: no_metadata_first
    metadata_first: false
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: no_rerank
    metadata_first: true
    rerank: false
    verifier_retry: true
    retrieval_mode: flat
  - name: no_verifier_retry
    metadata_first: true
    rerank: true
    verifier_retry: false
    retrieval_mode: flat
