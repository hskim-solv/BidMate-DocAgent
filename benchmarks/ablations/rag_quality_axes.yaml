id: rag_quality_axes
name: RAG quality/cost ablation axes
description: Compare the naive fixed+dense baseline against metadata-first retrieval, reranking, verifier retry, and hierarchical evidence assembly.
baseline_run: naive_baseline
primary_run: full
runs:
  - name: naive_baseline
    pipeline: naive_baseline
  - name: full
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: hierarchical
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: hierarchical
  - name: no_metadata_first
    pipeline: agentic_full
    metadata_first: false
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: no_rerank
    pipeline: agentic_full
    metadata_first: true
    rerank: false
    verifier_retry: true
    retrieval_mode: flat
  - name: no_verifier_retry
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: false
    retrieval_mode: flat
  - name: hybrid_bm25
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
