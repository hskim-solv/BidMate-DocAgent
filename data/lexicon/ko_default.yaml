  - "확인"

# ─── Verification topic exclusions (issue #674) ───────────────────────
# Loaded as `frozenset[str]`. Tokens that must NOT become verification
# topics — they are query-form words (WH-interrogatives, postpositions,
# verb endings) that never appear verbatim in RFP document text.
# Applied inside `rag_verifier.verification_topics` only; no effect on
# tokenise / BM25 / embedding paths.
verification_topic_exclusions:
  # WH-interrogatives (의문사)
  - "며칠"       # how many days
  - "몇일"       # how many days (variant)
  - "언제"       # when
  - "어디"       # where
  - "어디서"     # from where
  - "왜"         # why
  - "얼마"       # how much (normalize_metadata_token("얼마나") → "얼마")
  - "몇"         # how many
  - "뭐"         # what (informal)
  - "어느"       # which
  # Postpositions that bleed into topics (조사 단독)
  - "안에"       # within / inside
  - "이내"       # within (duration)
  - "이후"       # after
  - "이전"       # before
  - "까지"       # until
  - "부터"       # from
  - "에서"       # at / from
  - "으로"       # to / by
  # Verb-ending forms that surface as whole tokens (동사 어미)
  - "마무리돼"   # (be) completed
  - "마무리되"   # (be) completed (stem form)
  - "완료돼"     # (be) done
  - "끝나"       # end / finish

# ─── Metadata evidence labels ─────────────────────────────────────────
# Loaded as `dict[str, tuple[str, ...]]`. Maps metadata field id to
# Korean evidence labels surfaced in answer schema (ADR 0003).
metadata_evidence_labels:
  budget: ["예산", "사업예산", "사업 금액"]
  published_at: ["공개 일자", "공고일"]
  bid_start_at: ["입찰", "입찰 시작일", "입찰 참여 시작일"]
  bid_deadline_at: ["입찰", "마감일", "입찰 마감일", "입찰 참여 마감일"]
  summary: ["요약", "사업 요약"]

# ─── Metadata claim labels (singular) ─────────────────────────────────
# Loaded as `dict[str, str]`. Single Korean label per metadata field for
# claim-text rendering.
metadata_claim_labels:
  budget: "사업예산"
  published_at: "공개 일자"
  bid_start_at: "입찰 시작일"
  bid_deadline_at: "입찰 마감일"
  summary: "사업 요약"

# ─── Metadata claim topic labels ──────────────────────────────────────
# Loaded as `dict[str, tuple[str, ...]]`. Alternate phrasings for
# claim-topic matching in the verifier.
metadata_claim_topic_labels:
  budget: ["예산", "사업예산", "사업금액", "금액"]
  published_at: ["공개", "일자", "공개일자", "공고일"]
  bid_start_at: ["입찰", "시작일", "입찰시작일", "입찰참여시작일", "일정"]
  bid_deadline_at: ["입찰", "마감일", "입찰마감일", "입찰참여마감일", "일정"]
  summary: ["요약", "사업요약", "사업기간", "기간"]

# ─── Korean particle suffixes (shared profile) ────────────────────────
# Loaded as `tuple[str, ...]`. Order preserved — `normalize_metadata_token`
