name: PR Eval Delta

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

# Cancel in-progress runs on the same PR when a new push arrives —
# the new push triggers a fresh run anyway, so finishing the stale
# one is wasted minutes (and risks stale PR comments).
concurrency:
  group: pr-eval-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EMBEDDING_BACKEND: hashing
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test:
    # Issue #931: matrix shard pytest x8 fans the suite across 8 parallel
    # ubuntu-latest runners. `scripts/test.sh` honors `BIDMATE_PYTEST_SPLITS`
    # + `BIDMATE_PYTEST_SHARD` env vars (passes `--splits N --group K` to
    # pytest-split). `fail-fast: false` so we see every failing shard, not
    # just the first. ~25min serial wall-clock → ~3-4min per-shard.
    # Per-shard coverage.xml uploads to Codecov with `shard-N` flags;
    # Codecov merges them server-side. Leaderboard --check runs only on
    # shard 1 (single-runner invariant; not test-suite-dependent).
    name: Pytest (shard ${{ matrix.shard }})
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    runs-on: ubuntu-latest
    env:
      BIDMATE_PYTEST_SPLITS: "8"
      BIDMATE_PYTEST_SHARD: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest
        run: bash scripts/test.sh

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ] && command -v coverage >/dev/null 2>&1; then
            {
              echo "## Coverage (shard ${{ matrix.shard }})";
              echo '```';
              coverage report --skip-empty || true;
              echo '```';
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-shard-${{ matrix.shard }}
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: shard-${{ matrix.shard }}
          fail_ci_if_error: false
          verbose: false

      - name: Verify leaderboard artifacts are in sync with history
        # Single-runner invariant — leaderboard history is not test-suite
        # dependent. Gating to shard 1 avoids 8× duplicate runs and a
        # racey artifact diff if shards complete out of order.
        if: matrix.shard == 1
        run: python3 scripts/leaderboard.py --check

  baseline-provenance:
    # Gate (issue #413): verify reports/real100/baseline.aggregate.json's
    # `provenance.git_commit` is still reachable from origin/<base ref>.
    # Catches the silent-breakage tail of issue #160 — a baseline whose
    # commit was force-pushed or rebased off main, leaving real-eval-delta
    # diffing against a phantom code state. Fast (stdlib only, no deps).
    name: Baseline provenance reachability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            scripts/check_baseline_provenance.py
            reports/real100/baseline.aggregate.json
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify baseline commit is reachable from base ref
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # If this PR modifies the baseline, the new provenance.git_commit
          # legitimately points at a commit that is not yet ancestor of
          # the base ref. Accept ancestry of the PR head SHA as the escape
          # hatch — the gate re-runs on every push and the merge commit,
          # so a stale SHA is caught the moment the PR moves past it.
          if git diff --name-only "$BASE_REF"...HEAD \
               | grep -qx 'reports/real100/baseline.aggregate.json'; then
            python scripts/check_baseline_provenance.py \
              --ref "$BASE_REF" --allow-equal-to "$PR_HEAD_SHA"
          else
            python scripts/check_baseline_provenance.py --ref "$BASE_REF"
          fi

  eval-delta:
    name: Eval delta vs base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          path: pr

      - name: Checkout base ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pr/requirements.txt

      # ADR 0049: HWP/PDF ingestion shells out to `npx kordoc`.
      # On Node-missing the loader auto-degrades to `csv_text`
      # (telemetry-visible), but for the eval-delta job we want the
      # kordoc path exercised so the PR's structural-extraction gains
      # are reflected in the delta vs. base.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (PR)
        run: |
          python -m pip install --upgrade pip
          pip install -r pr/requirements.txt

      - name: Build CI eval config (full pipeline only) — PR
        working-directory: pr
        run: |
          python -c "import yaml; c=yaml.safe_load(open('eval/config.yaml')); c['primary_run']='full'; c['ablation_runs']=[r for r in c['ablation_runs'] if r['name']=='full']; open('eval/config.ci.yaml','w').write(yaml.safe_dump(c, allow_unicode=True, sort_keys=False))"

      - name: Build CI eval config (full pipeline only) — base
        working-directory: base
        run: |
          python -c "import yaml; c=yaml.safe_load(open('eval/config.yaml')); c['primary_run']='full'; c['ablation_runs']=[r for r in c['ablation_runs'] if r['name']=='full']; open('eval/config.ci.yaml','w').write(yaml.safe_dump(c, allow_unicode=True, sort_keys=False))"

      # Both PR and base sides use the *PR side's* composite action
      # so this workflow keeps working in the transition PR (when main
      # / base hasn't received the action yet) and after merge (when
      # the two copies are identical). The composite's
      # `working-directory` input handles the divergence cleanly.
      - name: Build index + run eval — PR
        uses: ./pr/.github/actions/run-eval
        with:
          working-directory: pr
          config: eval/config.ci.yaml
          embedding-backend: hashing

      - name: Build index + run eval — base
        uses: ./pr/.github/actions/run-eval
        with:
          working-directory: base
          config: eval/config.ci.yaml
          embedding-backend: hashing

      - name: Render delta table
        # Wire the PR-body `[ALLOW_REGRESSION: <reason>]` convention
        # documented in scripts/compare_eval.py:17 to the script's env.
        # The docstring promised reviewer-acknowledged regressions would
        # exit 0 with annotation; without this env propagation the
        # workflow ignored the tag (e.g. ADR 0050 corpus expansion
        # legitimately shifts every quality metric on the synthetic
        # surface — the gate must accept the acknowledged trade-off).
        env:
          ALLOW_REGRESSION: ${{ contains(github.event.pull_request.body, '[ALLOW_REGRESSION') && 'true' || '' }}
        run: |
          python pr/scripts/compare_eval.py \
            --base base/reports/eval_summary.json \
            --head pr/reports/eval_summary.json \
            --title "Eval delta — \`full\` pipeline" > delta.md
          cat delta.md

      - name: Upload eval summaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-summaries
          path: |
            pr/reports/eval_summary.json
            base/reports/eval_summary.json

      - name: Upsert PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          marker="<!-- eval-delta-bot -->"
          body="$(printf '%s\n\n%s\n' "$marker" "$(cat delta.md)")"
          existing=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -f body="$body" >/dev/null
            echo "Updated existing comment $existing"
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          fi
