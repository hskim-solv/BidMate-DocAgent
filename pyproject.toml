[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

# Issue #334 (G8 of #284): opt-in ruff lint gate from scripts/test.sh.
# Rule selection is narrowed to the fatal pyflakes subset (syntax errors,
# undefined names). Pre-existing E402 / F401 / F841 findings across the
# codebase are real but out of scope for this PR — see "One PR, one concern"
# in CLAUDE.md. Broaden after a focused clean-up sweep lands.
[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["data/", "reports/", "artifacts/", "outputs/"]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.coverage.run]
branch = true
source = [
    "rag_core",
    "rag_synthesis",
    "rag_vector_store",
    "rag_rerank",
    "rag_observability",
    "ingestion",
    "visual_ingestion",
    "text_normalize",
    "bidmate_logging",
    "korean_lexicon",
    "rag_pipeline_presets",
    "rag_graph_agentic_full",
    "app",
    "api",
    "eval",
    "scripts",
]
omit = [
    "tests/*",
    "*/conftest.py",
    "scripts/_governance.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
exclude_also = [
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
