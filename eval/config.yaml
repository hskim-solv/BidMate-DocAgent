mode: rag
description: Public synthetic RFP evaluation with stratified ablation runs
index_dir: data/index
primary_run: naive_baseline
# Per-ablation latency budgets used by scripts/check_latency_slo.py.
# These are ABSOLUTE p95 ceilings for the public synthetic surface,
# which runs the deterministic `hashing` embedding backend in CI. The
# observed p95 is ~5 ms; the ceiling is set ~20x generous to absorb
# runner variance without producing flaky failures. Real-data runs use
# sentence-transformers and have their own (uncommitted) budgets.
# Budgets are per-pipeline-run name (matches `ablation_runs[].name`).
latency_budgets:
  naive_baseline:
    p95_ms: 100
  full:
    p95_ms: 200
  full_llm:
    # Stub synthesis backend adds <1 ms; real `anthropic` backend is
    # measured separately (operator-side, ADR 0005 boundary).
    p95_ms: 300
  full_llm_metadata:
    # Metadata extraction happens at ingest time, not query time, so
    # the per-query budget is identical to ``full``. The LLM-backed
    # ingest path is measured separately (operator-side, ADR 0005).
    p95_ms: 200
  agentic_full_finetuned:
    # Issue #179 / ADR 0027 — LoRA adapter merge happens at index-
    # build time, so per-query latency mirrors ``full``. Real
    # sentence-transformers encoding is the heavier path (operator-
    # side, ADR 0005); CI default backend (hashing) is a no-op.
    p95_ms: 200
  naive_baseline_finetuned:
    # Same as ``naive_baseline`` — the LoRA adapter does not change
    # the per-query retrieval shape, only the vector content.
    p95_ms: 100
  full_mecab:
    # Issue #561 / ADR 0031 — Mecab-ko tokenizer. Same budget as
    # full_kiwi; tokenizer fallback to regex when mecab unavailable.
    p95_ms: 200
  full_khaiii:
    # Issue #561 / ADR 0031 — Khaiii tokenizer. Same budget as full_kiwi.
    p95_ms: 200
  hwp_csv_text:
    # Issue #652 / ADR 0039 — HWP loader ablation (csv-text loader, text only).
    # Per-query latency mirrors `full`; actual HWP parsing is ingest-time.
    # Operator-side: build index with scripts/build_index.py --hwp_loader csv.
    p95_ms: 200
  hwp_native:
    # Issue #652 / ADR 0039 — HWP loader ablation (native loader, no tables).
    # Requires pyhwp installed; CI pyhwp-absent fallback is csv-text (loader-
    # invariant for hashing backend). Operator: --hwp_loader native.
    p95_ms: 200
  hwp_native_tables:
    # Issue #652 / ADR 0039 — HWP loader ablation (native loader, with tables).
    # Default when pyhwp is installed (ADR 0036 default). Operator: --hwp_loader
    # native_tables or omit flag.
    p95_ms: 200
# Per-stage latency budgets used by scripts/check_latency_slo.py (check_stage).
# Issue #625: stage_latency is measured but was unguarded — silent per-stage
# drift was possible even when total p95 stayed within ablation ceiling.
# Ceilings set at ~25x observed CI p95 to absorb runner variance without
# flaky failures. See: reports/eval_summary.json stage_latency block for
# observed values. Extend to additional ablations as needed.
stage_latency_budgets:
  naive_baseline:
    query_analysis_ms:
      p95_ms: 50    # observed CI p95 ≈ 2 ms; 25x ceiling
    retrieve_ms:
      p95_ms: 50    # observed CI p95 ≈ 0.2 ms
    answer_generation_ms:
      p95_ms: 20    # observed CI p95 ≈ 0.5 ms
  full:
    query_analysis_ms:
      p95_ms: 50    # observed CI p95 ≈ 1.6 ms
    retrieve_ms:
      p95_ms: 50    # observed CI p95 ≈ 0.2 ms
    verify_ms:
      p95_ms: 50    # observed CI p95 ≈ 1.4 ms
    answer_generation_ms:
      p95_ms: 20    # observed CI p95 ≈ 0.4 ms
answer_policy:
  answerable_status: supported
  unanswerable_status: insufficient
  min_claims_answerable: 1
  require_claim_citations: true
ablation_runs:
  - name: naive_baseline
    pipeline: naive_baseline
  - name: full
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  # ADR 0011 — additive LLM synthesis path. Default backend is `stub`
  # (deterministic, offline, free) so public CI stays per ADR 0004.
  # Real-data + live demo override `BIDMATE_SYNTHESIS_BACKEND=anthropic`.
  - name: full_llm
    pipeline: agentic_full_llm
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  # Issue #180 / ADR 0017 — additive LLM-driven RFP metadata extraction
  # via Claude tool use. Metadata extraction happens at ingest time
  # (``ingestion.normalize_ingestion_row``), so this row is meaningful
  # only when the index was rebuilt with
  # ``BIDMATE_METADATA_BACKEND=anthropic_tool_use`` (or
  # ``openai_function_call``). Default backend is ``regex`` (the
  # ADR 0001 invariant); ``stub`` matches the regex output bit-for-bit
  # so public CI / synthetic harness runs stay deterministic and free.
  # The pipeline itself is identical to ``full`` — only the
  # ``metadata["extracted"]`` sidecar in each chunk differs.
  - name: full_llm_metadata
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: hierarchical
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: hierarchical
  - name: no_metadata_first
    pipeline: agentic_full
    metadata_first: false
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
  - name: no_rerank
    pipeline: agentic_full
    metadata_first: true
    rerank: false
    verifier_retry: true
    retrieval_mode: flat
  - name: no_verifier_retry
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: false
    retrieval_mode: flat
  # Issue #694 — dedicated retrieval-quality time-series slot.
  # Uses the full retrieval stack (metadata_first, rerank) with
  # verifier_retry=false so the first-pass chunk ranking is measured
  # without the retry-and-relax feedback loop.  Evaluation focus:
  # chunk_recall_at_5/10/20 and chunk_ndcg_at_10/20; accuracy and
  # groundedness are expected to be lower than `full` since the verifier
  # retry that recovers from weak first-pass evidence is absent.
  # Distinct from `no_verifier_retry` in intent: this row is the
  # canonical leaderboard slot for tracking retrieval quality over time
  # (ADR 0030 forward-only series pattern); `no_verifier_retry` remains
  # the verifier-retry-contribution ablation reference.
  - name: retrieval_only
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: false
    retrieval_mode: flat
  - name: hybrid_bm25
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
  # Issue #149 — RRF k sweep. The default `hybrid_bm25` row above runs
  # at the current `RRF_K = 60` default; the three rows below sweep
  # k ∈ {10, 30, 100} so a real-data ablation can pick a robust k as
  # the new default. All other knobs are held identical to `hybrid_bm25`.
  - name: hybrid_bm25_k10
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    rrf_k: 10
  - name: hybrid_bm25_k30
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    rrf_k: 30
  - name: hybrid_bm25_k100
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    rrf_k: 100
  # Issue #151 — BGE-M3 multi-channel measurement spike. ``m3`` backend
  # fuses BGE-M3 의 dense + sparse + multi-vector (ColBERT-style) 세 채널을
  # N-way RRF 로 결합한다. Opt-in 이며 ``pip install -r requirements-m3.txt``
  # 가 필요. 공개 합성 CI 는 ``EMBEDDING_BACKEND=hashing`` 으로 돌고
  # 이 row 를 실행하지 않으므로 smoke 가 영향받지 않는다. ADR 0010 의
  # "Alternatives considered" (lines 72-85) 가 명시한 deferred ablation
  # 의 후속. 결과 분석은 ``docs/m3-multichannel-spike.md`` 가 담당.
  # Channel-level decomposition (sparse-only, colbert-only) 은 lift 가
  # 정당화되는 경우에만 follow-up PR 에서.
  - name: m3_full
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: m3
    # ``eval/run_eval.py.ablation_runs`` checks this and silently drops
    # the row when FlagEmbedding isn't importable, so the public
    # synthetic CI (hashing backend, no opt-in dep installed) stays
    # green. The row runs as soon as ``pip install -r requirements-m3.txt``
    # is applied.
    requires_module: FlagEmbedding
    requires_torch_min_version: "2.6"
  # Issue #150 — BM25 채널 전용 stopword/조사 셋 (까지/부터/마다/조차/…)
  # 을 적용한 hybrid 비교 셀. dense + Jaccard lexical 경로는 건드리지
  # 않고 BM25 corpus + query 토큰만 필터함. `hybrid_bm25` (shared
  # profile) 가 control.
  - name: hybrid_bm25_extra_stopwords
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    bm25_stopword_profile: bm25_extra
  # Issue #152 — feasibility investigation (docs/investigations/152-splade-
  # colbert-feasibility.md). Cell C3 of the 2×2 gap-quantification sweep:
  # crosses #149 's `rrf_k` knob and #150 's `bm25_stopword_profile` knob.
  # Sibling rows above cover one axis each; this row is the only cell that
  # combines both. Real-data delta (private 21-case) lands in the §3.3 table
  # of the investigation note per ADR 0005 boundary.
  - name: hybrid_bm25_k30_extra
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    rrf_k: 30
    bm25_stopword_profile: bm25_extra
  # Issue #486 / ADR 0031 — Korean morphology BM25 ablation. Same retrieval +
  # verifier as `hybrid_bm25` (control row); only the BM25 tokenizer swaps
  # from regex word-extraction to kiwipiepy morpheme analysis (체언 / 용언 /
  # 수식어 / 외래어 POS filter). Never-raise: if kiwipiepy is missing from
  # the runtime, `korean_lexicon.kiwi_tokens` returns `None` and the dispatch
  # silently falls back to regex tokens — so under that condition this row
  # is byte-equal to `hybrid_bm25`. Real lift (or 0pp confirmation) requires
  # the kiwipiepy wheel and the public-synthetic eval surface.
  - name: full_kiwi
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    bm25_tokenizer: kiwi
  # Issue #561 / ADR 0031 valid-set expansion — Mecab-ko BM25 tokenizer.
  # Same retrieval + verifier as `full_kiwi` (kiwi control row); only
  # the BM25 tokenizer swaps to Mecab-ko morpheme analysis.
  # Never-raise: if python-mecab-ko / konlpy is missing, mecab_tokens
  # returns None and the dispatch falls back to regex (ADR 0001 invariant).
  # Measurement intent: lift vs kiwi ≥ +3pp → ADR 0031 default tokenizer
  # re-evaluation; lift < +3pp → kiwi selection is measurement-justified.
  - name: full_mecab
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    bm25_tokenizer: mecab
  # Issue #561 / ADR 0031 valid-set expansion — Khaiii BM25 tokenizer.
  # Khaiii requires a compiled C++ shared library (optional dependency).
  # Never-raise fallback to regex if khaiii is unavailable (ADR 0001).
  - name: full_khaiii
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    retrieval_backend: hybrid
    bm25_tokenizer: khaiii
  # Issue #163 / ADR 0011 pattern — additive cross-encoder reranker. The
  # existing `full` row is the natural negative (rerank_cross_encoder
  # defaults to false). Under the CI default backend (stub) the cross-
  # encoder is an identity pass-through, so `full_reranker` is byte-equal
  # to `full` on eval_summary.json. Real backends (BIDMATE_RERANK_BACKEND
  # in {bge, bge_ko, cohere}) re-score top-N candidates with sigmoid-
  # squashed cross-encoder scores.
  - name: full_reranker
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    rerank_cross_encoder: true
    verifier_retry: true
    retrieval_mode: flat
  # Issue #396 / ADR 0023 — additive query-side rewrite (HyDE). The
  # existing `full` row is the natural negative (`query_expansion`
  # defaults to identity). Under the public CI hashing-backend +
  # `BIDMATE_QUERY_EXPANSION_BACKEND` unset, ``HyDEExpander`` falls
  # back to the raw query (no ANTHROPIC_API_KEY), so `full_hyde` is
  # byte-equal to `full` on the deterministic eval surface. Real
  # backends (BIDMATE_QUERY_EXPANSION_BACKEND=hyde + ANTHROPIC_API_KEY)
  # generate a hypothetical RFP-style passage and embed it instead.
  - name: full_hyde
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    query_expansion: hyde
  # Issue #179 / ADR 0027 — additive LoRA-fine-tuned embedding adapter.
  # The ``embedding_model`` / ``embedding_lora_adapter`` keys are
  # documentation read by ``scripts/run_embedding_ablation.py`` at
  # index-build time; they are silently dropped by
  # ``eval/run_eval.normalize_run_config`` so under the default
  # hashing CI backend these rows are byte-equal to their parents
  # (``full`` / ``naive_baseline``). The adapter only changes vector
  # content when both ``BIDMATE_EMBEDDING_BACKEND=sentence-transformers``
  # and ``BIDMATE_EMBEDDING_LORA_ADAPTER=<hf-repo>@<sha>`` are set —
  # mirrors the ADR 0011 / 0017 / 0023 additive-opt-in pattern.
  # The ``@<sha>`` placeholder is replaced with the pinned commit SHA
  # in #179 once the adapter is trained and uploaded; ADR 0027
  # mandates SHA pinning to close the supply-chain hole.
  - name: agentic_full_finetuned
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    embedding_model: nlpai-lab/KURE-v1
    embedding_lora_adapter: bidmate/embedding-lora-kure-rfp-ko-v1@<sha>
  - name: naive_baseline_finetuned
    pipeline: naive_baseline
    embedding_model: nlpai-lab/KURE-v1
    embedding_lora_adapter: bidmate/embedding-lora-kure-rfp-ko-v1@<sha>
  # Issue #652 / ADR 0039 — HWP loader 3-way ablation.
  # These three rows require separate pre-built indexes (one per loader);
  # operator-side: `scripts/build_index.py --hwp_loader {csv,native,native_tables}`.
  # CI hashing backend is loader-invariant (ingest is text-only); real
  # measurement needs pyhwp installed + native-parsed index (ADR 0005 boundary).
  # ADR 0001: naive_baseline row is unchanged; all three rows ride agentic_full.
  - name: hwp_csv_text
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    hwp_loader: csv
  - name: hwp_native
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    hwp_loader: native
  - name: hwp_native_tables
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    hwp_loader: native_tables
