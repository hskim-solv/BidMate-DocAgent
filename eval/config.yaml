  # Issue #648 / ADR 0039 — HWP structural hardcase taxonomy activation
  # (PR-A). Fixtures: rfp_agency_f_smart_factory_hwp.json (table_heavy) and
  # rfp_agency_g_traffic_hwp.json (layout_broken + rotated_or_skewed).
  # Five cases exercise the four new ADR 0039 categories on the public
  # synthetic surface. Fixtures are redistributable synthetic JSON with
  # metadata.source_format="hwp"; no .hwp binary is committed so
  # _resolve_loader is never called in CI (pyhwp-absent safe).
  # ADR 0001: corpus additive only — retrieval/verifier paths unchanged.

  - id: hwp_f_table_budget
    query_type: single_doc
    hardcase_categories:
      - table_heavy
    query: "기관 F 스마트팩토리 플랫폼 구축 사업의 총 사업비는 얼마인가?"
    expected_doc_ids:
      - rfp-agency-f-smart-factory-hwp
    expected_terms:
      - "4억 3,500만원"
      - "435,000,000"
    expected_citation_terms:
      - "435,000,000"
    expected_claim_targets:
      - "기관 F"
    expected_claim_citations:
      - target: "기관 F"
        expected_doc_ids:
          - rfp-agency-f-smart-factory-hwp
        expected_terms:
          - "435,000,000"
    answerable: true

  - id: hwp_g_layout_contract_amount
    query_type: single_doc
    hardcase_categories:
      - layout_broken
      - rotated_or_skewed
      - ocr_noisy
