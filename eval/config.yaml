  # Issue #69 / docs/real-data-failure-taxonomy.md C6 — partial-topic
  # recovery. After issue #89 the gate also requires ≥ 2 matched
  # topics (cuts the 1-of-2 incidental-overlap pattern that flipped
  # real-data intended-abstention cases). This case now uses 3 topics
  # with 2 in-corpus ("보안 통제", "로그 추적") + 1 out-of-corpus
  # ("양자암호"), producing a 2-of-3 ≈ 0.667 partial match that
  # satisfies both the fraction floor (0.5) and the matched-count
  # floor (2). It remains the public synthetic guard that the
  # partial-recovery path stays in effect.
  - id: partial_topic_security_quantum
    query_type: single_doc
    query: "기관 A의 보안 통제, 로그 추적과 양자암호 적용 방안은?"
    expected_doc_ids:
      - rfp-agency-a-ai-quality
    expected_terms:
      - "보안 통제"
      - "로그 추적"
    expected_citation_terms:
      - "보안 통제"
    expected_answer_status: partial
    min_claims: 1
    expected_claim_targets:
      - "기관 A"
    expected_claim_citations:
      - target: "기관 A"
        expected_doc_ids:
          - rfp-agency-a-ai-quality
        expected_terms:
          - "보안 통제"
    answerable: true

  # Issue #89 — out-of-corpus abstention regression guard. The
  # analyzer decomposes "보안과 드론" into exactly 2 single-token
  # verification topics: "보안" (in-corpus, appears in
  # rfp_agency_a_ai_quality and rfp_agency_b_mlops_governance) and
  # "드론" (out-of-corpus). Under the original fraction=0.5 +
  # matched≥1 policy this 1-of-2 case flipped intended abstention to
  # `partial`. With the matched≥2 floor the gate keeps it as
  # `insufficient` (the global `unanswerable_status` default at the
  # top of this file). This is the public synthetic guard for the
  # tightening so the regression is caught in CI without needing the
  # private real-data surface.
  #
  # Note: the natural phrasing "보안 통제와 드론은?" decomposes into
  # 4 sub-topics (보안 / 보안 통제 / 통제 / 드론), giving 3-of-4
  # matched and *not* exercising the 1-of-N pattern. Single-noun
  # phrasing keeps the regression target deterministic.
  - id: abstention_one_of_two_topic_overlap
    query_type: abstention
    query: "기관 A의 보안과 드론은?"
    expected_doc_ids: []
    expected_terms:
      - "드론"
    answerable: false

  # Issue #73 — chunk-boundary probe set. The probe fixture
  # `data/raw/rfp_agency_d_spectrometer_probe.json` is intentionally
  # long enough to chunk into multiple pieces under default
  # max_chars=520 (3+ chunks across 2 parent sections under
  # `auto`/`section` strategy). Each probe query targets a fact that
  # lives in a specific chunk position — first/middle/last/overlap —
  # so a regression in chunking that drops or misaligns a chunk
  # surfaces here even if upstream retrieval (entity / metadata /
  # filter) keeps working. Diagnostics: each evidence item now carries
  # `chunk_seq_in_section` and `total_chunks_in_section` so reviewers
  # can read "got chunk 2/3" vs "got chunk 1/3 when answer was in 2/3"
  # straight from `outputs/answer.json`.
  - id: chunk_probe_external_audit_period
    query_type: single_doc
    hardcase_categories:
      - chunk_boundary
    query: "기관 D 분광기 운영 데이터의 외부 감사 주기는?"
    expected_doc_ids:
      - rfp-agency-d-spectrometer-probe
    expected_terms:
      - "분기별"
    # Manually verified (issue #175). Audit-period text lives in chunk-002.
    gold_chunk_ids:
      - rfp-agency-d-spectrometer-probe::chunk-002
    expected_citation_terms:
      - "분기별"
    answerable: true

