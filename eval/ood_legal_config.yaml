mode: rag
description: |
  OOD evaluation surface (ADR 0046) — Korean legal contracts.
  Mirrors `eval/config.yaml`'s ablation shape against the
  data/ood_synthetic_legal corpus generated by
  scripts/generate_ood_legal.py (E2 / PR #850). RFP eval is untouched.

  Cases are intentionally narrow to keep the floor invariant
  measurable: 15+ queries covering the 5 contract categories
  with the same query_type taxonomy (single_doc / comparison /
  extraction / abstention) as the RFP surface.
index_dir: data/ood_legal_index
primary_run: naive_baseline

# Latency budgets are looser than the RFP surface — the OOD corpus is
# 50 docs and ~250 chunks, so retrieval is faster, but we keep the
# same ceilings to avoid masking regressions that show up only on the
# smaller corpus.
latency_budgets:
  naive_baseline:
    p95_ms: 100
  full:
    p95_ms: 200

stage_latency_budgets:
  naive_baseline:
    query_analysis_ms:
      p95_ms: 50
    retrieve_ms:
      p95_ms: 50
    answer_generation_ms:
      p95_ms: 20
  full:
    query_analysis_ms:
      p95_ms: 50
    retrieve_ms:
      p95_ms: 80
    answer_generation_ms:
      p95_ms: 20

answer_policy:
  answerable_status: supported
  unanswerable_status: insufficient
  min_claims_answerable: 1
  require_claim_citations: true

# Only two ablations — the rest of eval/config.yaml's matrix is
# RFP-specific (LLM synthesis, m3, kiwi, etc.). ADR 0046 names
# `agentic_full` as the lift baseline against `naive_baseline`,
# so we run exactly that pair.
ablation_runs:
  - name: naive_baseline
    pipeline: naive_baseline
  - name: full
    pipeline: agentic_full
    metadata_first: true
    rerank: true
    verifier_retry: true
    retrieval_mode: flat
    metadata_backend: regex

cases:
  # ---------------------------------------------------------------
  # single_doc — 5 categories × 1 case each
  # ---------------------------------------------------------------
  - id: single_doc_service_tos_termination
    query_type: single_doc
    query: "서비스 이용약관 1호의 해지 통지 기간은?"
    expected_doc_ids:
      - legal-service_tos-01
    expected_terms:
      - "30일"
      - "서면 통지"
    expected_citation_terms:
      - "30일"
      - "서면 통지"
    answerable: true

  - id: single_doc_nda_loss_floor
    query_type: single_doc
    query: "NDA 3호의 비밀정보 유출 시 손해배상 하한액은?"
    expected_doc_ids:
      - legal-nda-03
    expected_terms:
      - "손해배상"
    expected_citation_terms:
      - "손해배상"
    answerable: true

  - id: single_doc_consortium_role_split
    query_type: single_doc
    query: "컨소시엄 협약 2호에서 주관기관과 참여기관의 역할 분담은?"
    expected_doc_ids:
      - legal-consortium-02
    expected_terms:
      - "주관기관"
      - "참여기관"
    expected_citation_terms:
      - "주관기관"
      - "참여기관"
    answerable: true

  - id: single_doc_data_processing_location
    query_type: single_doc
    query: "개인정보 처리 위탁계약 5호의 개인정보 처리 위치 조항은?"
    expected_doc_ids:
      - legal-data_processing-05
    expected_terms:
      - "국내 데이터센터"
      - "국외 이전"
    expected_citation_terms:
      - "국내 데이터센터"
    answerable: true

  - id: single_doc_sla_availability
    query_type: single_doc
    query: "SLA 4호의 월간 가용성 보장 수준은?"
    expected_doc_ids:
      - legal-sla-04
    expected_terms:
      - "99.9%"
    expected_citation_terms:
      - "99.9%"
    answerable: true

  # ---------------------------------------------------------------
  # comparison — 2 cross-category + 2 within-category
  # ---------------------------------------------------------------
  - id: comparison_tos_vs_nda_termination
    query_type: comparison
    query: "서비스 이용약관 1호와 NDA 1호의 유효기간 / 해지 조건 차이는?"
    expected_doc_ids:
      - legal-service_tos-01
      - legal-nda-01
    expected_terms:
      - "30일"
      - "유효기간"
    expected_citation_terms:
      - "30일"
      - "유효기간"
    answerable: true

  - id: comparison_sla_pen_severity
    query_type: comparison
    query: "SLA 1호와 SLA 2호의 페널티 조항 차이는?"
    expected_doc_ids:
      - legal-sla-01
      - legal-sla-02
    expected_terms:
      - "페널티"
    expected_citation_terms:
      - "페널티"
    answerable: true

  - id: comparison_consortium_budget_split
    query_type: comparison
    query: "컨소시엄 협약 3호와 4호의 예산 배분 방식 차이는?"
    expected_doc_ids:
      - legal-consortium-03
      - legal-consortium-04
    expected_terms:
      - "주관기관"
      - "참여기관"
    expected_citation_terms:
      - "주관기관"
    answerable: true

  - id: comparison_data_processing_destruction
    query_type: comparison
    query: "개인정보 처리 위탁계약 2호와 3호의 파기 기한 차이는?"
    expected_doc_ids:
      - legal-data_processing-02
      - legal-data_processing-03
    expected_terms:
      - "14일"
      - "파기"
    expected_citation_terms:
      - "14일"
      - "파기"
    answerable: true

  # ---------------------------------------------------------------
  # extraction — metadata / number lookup
  # ---------------------------------------------------------------
  - id: extraction_service_tos_fee
    query_type: single_doc
    query: "서비스 이용약관 6호의 월 이용료 지급 조건은?"
    expected_doc_ids:
      - legal-service_tos-06
    expected_terms:
      - "이용료"
      - "지연이자"
    expected_citation_terms:
      - "이용료"
    answerable: true

  - id: extraction_nda_post_term_obligation
    query_type: single_doc
    query: "NDA 7호의 계약 종료 후 비밀유지 의무 존속 기간은?"
    expected_doc_ids:
      - legal-nda-07
    expected_terms:
      - "5년"
    expected_citation_terms:
      - "5년"
    answerable: true

  - id: extraction_sla_response_time
    query_type: single_doc
    query: "SLA 8호의 긴급 장애 신고 1차 응답 시간은?"
    expected_doc_ids:
      - legal-sla-08
    expected_terms:
      - "30분"
    expected_citation_terms:
      - "30분"
    answerable: true

  # ---------------------------------------------------------------
  # abstention — query that the corpus cannot answer
  # ---------------------------------------------------------------
  - id: abstention_unrelated_industry
    query_type: abstention
    query: "특허 라이센싱 계약의 로열티 비율은?"
    expected_terms: []
    expected_citation_terms: []
    answerable: false

  - id: abstention_out_of_corpus_concept
    query_type: abstention
    query: "주식 양도 계약의 락업 기간은?"
    expected_terms: []
    expected_citation_terms: []
    answerable: false

  - id: abstention_no_such_clause
    query_type: abstention
    query: "NDA에 명시된 노동 시간 규정은?"
    expected_terms: []
    expected_citation_terms: []
    answerable: false
